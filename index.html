<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: #2a2a2f;
    --accent: #c8f135;
    --accent-dim: rgba(200, 241, 53, 0.12);
    --accent-dim2: rgba(200, 241, 53, 0.06);
    --text: #e8e8ea;
    --text-muted: #6b6b72;
    --text-dim: #9999a3;
    --danger: #ff4757;
    --radius: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 36px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .logo { display: flex; align-items: baseline; gap: 10px; }

  .logo-mark {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--accent); background: var(--accent-dim);
    border: 1px solid rgba(200, 241, 53, 0.25);
    padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em;
  }

  .logo-text { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .sync-status {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 4px 10px; border-radius: 20px;
    display: flex; align-items: center; gap: 5px; transition: all 0.3s;
  }
  .sync-status.synced { color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.2); }
  .sync-status.syncing { color: #f0a500; background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.2); }
  .sync-status.error { color: var(--danger); background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.2); }

  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .syncing .sync-dot { animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .add-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent); color: #0e0e10; border: none;
    padding: 10px 20px; border-radius: var(--radius);
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s ease;
  }
  .add-btn:hover { background: #d4f54a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,241,53,0.3); }
  .add-btn:active { transform: translateY(0); }

  .controls { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }

  .search-wrap { position: relative; flex: 1; min-width: 200px; }

  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }

  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 11px 14px 11px 38px; border-radius: var(--radius); outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: rgba(200,241,53,0.4); }

  .tags-filter { display: flex; gap: 8px; flex-wrap: wrap; }

  .tag-filter-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .tag-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .stats-bar {
    display: flex; align-items: center; gap: 6px; margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
  }
  .stats-count { color: var(--accent); font-weight: 500; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
    transition: border-color 0.2s, transform 0.15s; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .card:hover { border-color: rgba(200,241,53,0.2); transform: translateY(-1px); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1.3; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  .card-preview {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    color: var(--text-dim); line-height: 1.6; max-height: 80px; overflow: hidden; position: relative;
  }
  .card-preview::after {
    content:''; position:absolute; bottom:0;left:0;right:0; height:28px;
    background: linear-gradient(transparent, var(--surface2));
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

  .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 20px;
    background: var(--accent-dim2); color: var(--text-muted); border: 1px solid rgba(200,241,53,0.1);
  }

  .copy-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent-dim); border: 1px solid rgba(200,241,53,0.2); color: var(--accent);
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .copy-btn:hover { background: rgba(200,241,53,0.2); box-shadow: 0 0 12px rgba(200,241,53,0.15); }

  /* SKELETON */
  .skeleton-wrap { grid-column: 1/-1; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap:16px; }
  .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .skel { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; border-radius: 4px; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .empty { grid-column:1/-1; text-align:center; padding:80px 20px; color: var(--text-muted); }
  .empty-icon { font-size:40px; margin-bottom:16px; opacity:0.4; }
  .empty h3 { font-size:18px; font-weight:700; color: var(--text-dim); margin-bottom:8px; }
  .empty p { font-size:13px; font-family: 'JetBrains Mono', monospace; }

  /* MODAL */
  .modal-backdrop {
    position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
    z-index:100; display:flex; align-items:center; justify-content:center; padding:20px;
    animation: backdropIn 0.15s ease;
  }
  @keyframes backdropIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width:100%; max-width:560px; padding:28px;
    animation: modalIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .modal-title { font-size:18px; font-weight:800; letter-spacing:-0.02em; }

  .modal-close {
    background:transparent; border:1px solid var(--border); color:var(--text-muted);
    width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .modal-close:hover { color:var(--text); border-color:var(--text-dim); }

  .form-group { margin-bottom:18px; }

  label { display:block; font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:7px; }

  input[type="text"], textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px;
    padding:11px 14px; border-radius:var(--radius); outline:none; transition:border-color 0.2s; resize:none;
  }
  input[type="text"]::placeholder, textarea::placeholder { color:var(--text-muted); }
  input[type="text"]:focus, textarea:focus { border-color:rgba(200,241,53,0.4); }
  textarea { min-height:130px; line-height:1.6; }

  .form-hint { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-muted); margin-top:5px; }

  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }

  .btn-ghost {
    background:transparent; border:1px solid var(--border); color:var(--text-dim);
    font-family:'Syne',sans-serif; font-size:13px; font-weight:600;
    padding:10px 18px; border-radius:var(--radius); cursor:pointer; transition:all 0.15s;
  }
  .btn-ghost:hover { border-color:var(--text-dim); color:var(--text); }

  .btn-primary {
    background:var(--accent); color:#0e0e10; border:none;
    font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    padding:10px 22px; border-radius:var(--radius); cursor:pointer; transition:all 0.15s;
  }
  .btn-primary:hover { background:#d4f54a; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }

  .toast {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    background:var(--surface); border:1px solid rgba(200,241,53,0.3); color:var(--accent);
    font-family:'JetBrains Mono',monospace; font-size:12px;
    padding:10px 20px; border-radius:20px; z-index:200;
    animation: toastIn 0.2s ease, toastOut 0.3s ease 1.3s forwards; white-space:nowrap;
  }
  .toast.err { border-color:rgba(255,71,87,0.3); color:var(--danger); }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateX(-50%) translateY(6px)} }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="logo-mark">cloud</span>
      <span class="logo-text">Prompt Toolbox</span>
    </div>
    <div class="header-right">
      <div class="sync-status syncing" id="syncStatus">
        <div class="sync-dot"></div>
        <span id="syncLabel">连接中...</span>
      </div>
      <button class="add-btn" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        新增 Prompt
      </button>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜索标题、描述、内容..." oninput="renderCards()">
    </div>
  </div>

  <div class="tags-filter" id="tagsFilter"></div>
  <div style="height:16px"></div>

  <div class="stats-bar">
    <span class="stats-count" id="statsCount">—</span>
    <span>个 prompt</span>
  </div>

  <div class="grid" id="grid">
    <div class="skeleton-wrap">
      <div class="skeleton-card">
        <div class="skel" style="height:18px;width:55%"></div>
        <div class="skel" style="height:12px;width:80%"></div>
        <div class="skel" style="height:70px"></div>
        <div class="skel" style="height:24px;width:35%"></div>
      </div>
      <div class="skeleton-card">
        <div class="skel" style="height:18px;width:70%"></div>
        <div class="skel" style="height:12px;width:60%"></div>
        <div class="skel" style="height:70px"></div>
        <div class="skel" style="height:24px;width:45%"></div>
      </div>
      <div class="skeleton-card">
        <div class="skel" style="height:18px;width:40%"></div>
        <div class="skel" style="height:12px;width:75%"></div>
        <div class="skel" style="height:70px"></div>
        <div class="skel" style="height:24px;width:30%"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" style="display:none" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">新增 Prompt</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="fTitle" placeholder="给这个 prompt 起个名字">
    </div>
    <div class="form-group">
      <label>使用场景描述</label>
      <input type="text" id="fDesc" placeholder="什么时候用这个？一句话说清楚">
    </div>
    <div class="form-group">
      <label>Prompt 正文</label>
      <textarea id="fContent" placeholder="粘贴你的 prompt 内容..."></textarea>
    </div>
    <div class="form-group">
      <label>标签</label>
      <input type="text" id="fTags" placeholder="写作, 代码, 翻译, 分析...">
      <div class="form-hint">用逗号分隔，多个标签</div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="saveBtn" onclick="savePrompt()">保存</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://stlfvwtbnztzlgjnvjzh.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0bGZ2d3Ribnp0emxnam52anpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDcyNTQsImV4cCI6MjA4ODg4MzI1NH0.XowtLj05Zc6bYAKmjqdNZx4mw5FuI9058EPZu1sB19o';
  const API = `${SUPABASE_URL}/rest/v1/prompts`;
  const H = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  let prompts = [];
  let editingId = null;
  let activeTag = null;

  function setSyncStatus(state) {
    const el = document.getElementById('syncStatus');
    const label = document.getElementById('syncLabel');
    el.className = 'sync-status ' + state;
    label.textContent = { synced: '已同步', syncing: '同步中...', error: '连接失败' }[state];
  }

  async function req(url, opts = {}) {
    const res = await fetch(url, { ...opts, headers: { ...H, ...(opts.headers || {}) } });
    if (!res.ok) throw new Error(await res.text());
    return res.status === 204 ? null : res.json();
  }

  async function loadPrompts() {
    setSyncStatus('syncing');
    try {
      const data = await req(`${API}?order=created_at.desc`);
      prompts = data.map(p => ({ ...p, desc: p.description }));
      setSyncStatus('synced');
      renderCards();
    } catch (e) {
      setSyncStatus('error');
      showToast('⚠ 无法连接数据库', true);
      document.getElementById('grid').innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>连接失败</h3><p>请检查是否已关闭 RLS，或刷新重试</p></div>`;
    }
  }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  function getAllTags() {
    const set = new Set();
    prompts.forEach(p => (p.tags||[]).forEach(t => set.add(t)));
    return [...set].sort();
  }

  function renderTagsFilter() {
    const tags = getAllTags();
    const wrap = document.getElementById('tagsFilter');
    if (!tags.length) { wrap.innerHTML = ''; return; }
    wrap.innerHTML =
      `<button class="tag-filter-btn ${activeTag===null?'active':''}" onclick="setTagFilter(null)">全部</button>` +
      tags.map(t => `<button class="tag-filter-btn ${activeTag===t?'active':''}" onclick="setTagFilter('${encodeURIComponent(t)}')">${t}</button>`).join('');
  }

  function setTagFilter(tag) {
    activeTag = tag ? decodeURIComponent(tag) : null;
    renderCards();
  }

  function renderCards() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const filtered = prompts.filter(p => {
      const matchTag = !activeTag || (p.tags||[]).includes(activeTag);
      const matchQ = !q || [p.title, p.description, p.content].some(s => s && s.toLowerCase().includes(q));
      return matchTag && matchQ;
    });

    document.getElementById('statsCount').textContent = filtered.length;
    renderTagsFilter();

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">◻</div>
        <h3>${prompts.length ? '没有匹配结果' : '还没有任何 Prompt'}</h3>
        <p>${prompts.length ? '换个关键词试试' : '点击右上角新增你的第一个 prompt'}</p>
      </div>`;
      return;
    }
    grid.innerHTML = filtered.map(cardHTML).join('');
  }

  function cardHTML(p) {
    const desc = p.description || '';
    const tags = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const preview = (p.content||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${p.title||'无标题'}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="openEdit('${p.id}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-6 6H2.5v-2l6-6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
          </button>
          <button class="icon-btn danger" onclick="deletePrompt('${p.id}')">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 1.5l8 8M9.5 1.5l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      ${desc ? `<div class="card-desc">${desc}</div>` : ''}
      <div class="card-preview">${preview}</div>
      <div class="card-footer">
        <div class="card-tags">${tags}</div>
        <button class="copy-btn" id="copy-${p.id}" onclick="copyPrompt('${p.id}')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="1" width="7" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 4v6.5A1.5 1.5 0 002.5 12H8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          复制
        </button>
      </div>
    </div>`;
  }

  function copyPrompt(id) {
    const p = prompts.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.content).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = p.content; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    const btn = document.getElementById('copy-' + id);
    if (btn) btn.innerHTML = '✓ 已复制';
    setTimeout(() => {
      if (btn) btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="4" y="1" width="7" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1 4v6.5A1.5 1.5 0 002.5 12H8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg> 复制`;
    }, 1800);
    showToast('✓ 已复制到剪贴板');
  }

  function showToast(msg, isErr=false) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast' + (isErr ? ' err' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1700);
  }

  function openModal(id) {
    editingId = id || null;
    const p = id ? prompts.find(x => x.id === id) : null;
    document.getElementById('modalTitle').textContent = p ? '编辑 Prompt' : '新增 Prompt';
    document.getElementById('fTitle').value = p ? p.title : '';
    document.getElementById('fDesc').value = p ? (p.description||'') : '';
    document.getElementById('fContent').value = p ? p.content : '';
    document.getElementById('fTags').value = p ? (p.tags||[]).join(', ') : '';
    document.getElementById('saveBtn').disabled = false;
    document.getElementById('saveBtn').textContent = '保存';
    document.getElementById('modalBackdrop').style.display = 'flex';
    setTimeout(() => document.getElementById('fTitle').focus(), 50);
  }

  function openEdit(id) { openModal(id); }

  function closeModal() {
    document.getElementById('modalBackdrop').style.display = 'none';
    editingId = null;
  }

  function handleBackdropClick(e) { if (e.target.id === 'modalBackdrop') closeModal(); }

  async function savePrompt() {
    const title = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('fContent').value.trim();
    if (!title || !content) { showToast('⚠ 标题和正文不能为空', true); return; }

    const tags = document.getElementById('fTags').value.split(/[,，]/).map(t=>t.trim()).filter(Boolean);
    const description = document.getElementById('fDesc').value.trim();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '保存中...';
    setSyncStatus('syncing');

    try {
      if (editingId) {
        const res = await req(`${API}?id=eq.${editingId}`, {
          method: 'PATCH', body: JSON.stringify({ title, description, content, tags })
        });
        const idx = prompts.findIndex(p => p.id === editingId);
        if (idx > -1 && res?.[0]) prompts[idx] = res[0];
      } else {
        const id = genId();
        const res = await req(API, {
          method: 'POST',
          body: JSON.stringify({ id, title, description, content, tags, created_at: Date.now() })
        });
        if (res?.[0]) prompts.unshift(res[0]);
      }
      setSyncStatus('synced');
      closeModal();
      renderCards();
      showToast(editingId ? '✓ 已更新' : '✓ 已保存');
    } catch (e) {
      setSyncStatus('error');
      showToast('⚠ 保存失败，请重试', true);
      btn.disabled = false; btn.textContent = '保存';
    }
  }

  async function deletePrompt(id) {
    if (!confirm('删除这个 prompt？')) return;
    setSyncStatus('syncing');
    try {
      await req(`${API}?id=eq.${id}`, { method: 'DELETE', headers: { 'Prefer': '' } });
      prompts = prompts.filter(p => p.id !== id);
      setSyncStatus('synced');
      renderCards();
      showToast('已删除');
    } catch (e) {
      setSyncStatus('error');
      showToast('⚠ 删除失败', true);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  });

  loadPrompts();
</script>
</body>
</html>
