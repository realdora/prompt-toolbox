name: Supabase Keepalive

on:
  schedule:
    # Mon/Wed/Fri at 12:00 UTC — max gap 3 days
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Insert keepalive row in Supabase
        shell: bash
        run: |
          set +e

          url="${{ secrets.SUPABASE_URL }}"
          key="${{ secrets.SUPABASE_ANON_KEY }}"

          echo "URL length: ${#url}"
          echo "KEY length: ${#key}"
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is empty"
            exit 1
          fi
          url="${url%/}"

          host=$(echo "$url" | sed -E 's|https?://||; s|/.*||')
          echo "Resolving host: $host"
          if ! getent hosts "$host" > /dev/null; then
            echo "::error::DNS resolution failed for $host — project is likely PAUSED. Restore at https://supabase.com/dashboard"
            exit 1
          fi

          # WRITE (POST) into _keepalive table — guaranteed to hit Postgres,
          # unlike GET which may be served from a cache layer and not count as activity.
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST \
            -H "apikey: $key" \
            -H "Authorization: Bearer $key" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}' \
            "$url/rest/v1/_keepalive")
          curl_exit=$?

          echo "curl exit: $curl_exit"
          echo "HTTP status: $response"
          echo "Response body (first 200 chars):"
          head -c 200 /tmp/body; echo

          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::curl failed with exit $curl_exit"
            exit 1
          fi

          # 201 Created = INSERT succeeded
          if [ "$response" = "201" ] || [ "$response" = "200" ]; then
            echo "Keepalive row inserted — Postgres write registered"
            exit 0
          else
            echo "::error::Insert failed with HTTP $response — check RLS policy on public._keepalive"
            exit 1
          fi
