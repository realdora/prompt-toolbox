name: Supabase Keepalive

on:
  schedule:
    # Every 6 days at 12:00 UTC (well within the 7-day inactivity threshold)
    - cron: '0 12 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "HTTP status: $response"
          # Any HTTP response (even 401/404) means Supabase is alive and counted activity.
          # Only fail if there was no response at all (curl error → empty string).
          if [ -n "$response" ] && [ "$response" -ge 100 ]; then
            echo "Supabase project responded — activity registered, project will not pause"
            exit 0
          else
            echo "No response from Supabase — project may be down or URL wrong"
            exit 1
          fi
